name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-release:
    name: Build Production Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir and Erlang
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.20.2'
          otp-version: '29.0.2'

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            ~/.mix
            ~/.hex
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Restore assets cache
        uses: actions/cache@v4
        with:
          path: assets/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('assets/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        run: mix deps.get --only prod
        env:
          MIX_ENV: prod

      - name: Deploy assets
        run: mix assets.deploy
        env:
          MIX_ENV: prod

      - name: Build release
        run: mix release --overwrite --quiet
        env:
          MIX_ENV: prod

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: premiere-ecoute-release
          path: _build/prod/rel/premiere_ecoute/
          retention-days: 3

  deploy-to-digital-ocean:
    name: Deploy to Digital Ocean
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - uses: actions/checkout@v4

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: premiere-ecoute-release
          path: _build/prod/rel/premiere_ecoute/

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Create .env.production file
        run: |
          # Unquoted EOF allows variable substitution in the heredoc below.
          cat > .env.production <<EOF
          # Phoenix
          PHX_HOST=${PHX_HOST}
          PHX_SERVER=true
          PORT=4000
          SECRET_KEY_BASE=${SECRET_KEY_BASE}
          MIX_ENV=prod

          # Database
          POSTGRES_DATABASE=${POSTGRES_DATABASE}
          POSTGRES_USERNAME=${POSTGRES_USERNAME}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_HOSTNAME=localhost
          POSTGRES_ENCRYPTION_KEY=${POSTGRES_ENCRYPTION_KEY}

          # Spotify API
          SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
          SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
          SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI}

          # Twitch API
          TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
          TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET}
          TWITCH_REDIRECT_URI=${TWITCH_REDIRECT_URI}
          TWITCH_WEBHOOK_CALLBACK_URL=${TWITCH_WEBHOOK_CALLBACK_URL}
          TWITCH_WEBHOOK_SECRET=${TWITCH_WEBHOOK_SECRET}
          TWITCH_EXTENSION_SECRET=${TWITCH_EXTENSION_SECRET}

          # Other APIs
          DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
          BUYMEACOFFEE_API_KEY=${BUYMEACOFFEE_API_KEY}
          RESEND_API_KEY=${RESEND_API_KEY}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          MISTRAL_API_KEY=${MISTRAL_API_KEY}
          SENTRY_DSN=${SENTRY_DSN}
          YOUTUBE_DATA_API_V3_KEY=${YOUTUBE_DATA_API_V3_KEY}
          GENIUS_ACCESS_TOKEN=${GENIUS_ACCESS_TOKEN}
          TIDAL_CLIENT_ID=${TIDAL_CLIENT_ID}
          TIDAL_CLIENT_SECRET=${TIDAL_CLIENT_SECRET}

          # Feature Flags Auth
          AUTH_USERNAME=${AUTH_USERNAME}
          AUTH_PASSWORD=${AUTH_PASSWORD}

          # PostHog
          POSTHOG_API_KEY=${POSTHOG_API_KEY}

          # Grafana Cloud - PromEx dashboard upload
          GRAFANA_HOST=${GRAFANA_HOST}
          GRAFANA_API_TOKEN=${GRAFANA_API_TOKEN}
          EOF
        env:
          PHX_HOST: ${{ secrets.PHX_HOST }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          POSTGRES_DATABASE: ${{ secrets.POSTGRES_DATABASE }}
          POSTGRES_USERNAME: ${{ secrets.POSTGRES_USERNAME }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_ENCRYPTION_KEY: ${{ secrets.POSTGRES_ENCRYPTION_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REDIRECT_URI: ${{ secrets.SPOTIFY_REDIRECT_URI }}
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          TWITCH_REDIRECT_URI: ${{ secrets.TWITCH_REDIRECT_URI }}
          TWITCH_WEBHOOK_CALLBACK_URL: ${{ secrets.TWITCH_WEBHOOK_CALLBACK_URL }}
          TWITCH_WEBHOOK_SECRET: ${{ secrets.TWITCH_WEBHOOK_SECRET }}
          TWITCH_EXTENSION_SECRET: ${{ secrets.TWITCH_EXTENSION_SECRET }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          BUYMEACOFFEE_API_KEY: ${{ secrets.BUYMEACOFFEE_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          YOUTUBE_DATA_API_V3_KEY: ${{ secrets.YOUTUBE_DATA_API_V3_KEY }}
          GENIUS_ACCESS_TOKEN: ${{ secrets.GENIUS_ACCESS_TOKEN }}
          TIDAL_CLIENT_ID: ${{ secrets.TIDAL_CLIENT_ID }}
          TIDAL_CLIENT_SECRET: ${{ secrets.TIDAL_CLIENT_SECRET }}
          AUTH_USERNAME: ${{ secrets.AUTH_USERNAME }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
          GRAFANA_HOST: ${{ secrets.GRAFANA_HOST }}
          GRAFANA_API_TOKEN: ${{ secrets.GRAFANA_API_TOKEN }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}

      - name: Backup current release
        run: |
          ssh root@${{ vars.DO_HOST }} '
            rm -rf /opt/premiere-ecoute-backup
            cp -a /opt/premiere-ecoute /opt/premiere-ecoute-backup
          '

      - name: Deploy release to server
        run: |
          rsync -avzq --delete --exclude='.env' --exclude='cache' _build/prod/rel/premiere_ecoute/ root@${{ vars.DO_HOST }}:/opt/premiere-ecoute/
          scp .env.production root@${{ vars.DO_HOST }}:/opt/premiere-ecoute/.env
          ssh root@${{ vars.DO_HOST }} 'chown -R premiere:premiere /opt/premiere-ecoute && find /opt/premiere-ecoute \( -path "*/bin/*" -o -path "*/priv/bin/*" -o -path "*/releases/*/elixir" -o -path "*/releases/*/iex" -o -name "*.so" \) -type f -exec chmod +x {} \;'

      - name: Remove local secrets file
        if: always()
        run: rm -f .env.production

      - name: Restart application
        run: |
          ssh root@${{ vars.DO_HOST }} '
            systemctl is-active postgresql
            systemctl restart premiere-ecoute
            systemctl status premiere-ecoute --no-pager
            journalctl -u premiere-ecoute -n 50 --no-pager
          '

      - name: Health check
        id: health_check
        run: |
          for i in $(seq 1 10); do
            if ssh root@${{ vars.DO_HOST }} 'curl -fsS -o /dev/null http://localhost:4000/health'; then
              echo "Application is healthy"
              exit 0
            fi
            echo "Health check attempt $i failed, retrying in 3s..."
            sleep 3
          done
          echo "Application failed health check"
          exit 1

      - name: Rollback on failed health check
        if: failure() && steps.health_check.outcome == 'failure'
        run: |
          ssh root@${{ vars.DO_HOST }} '
            rm -rf /opt/premiere-ecoute
            mv /opt/premiere-ecoute-backup /opt/premiere-ecoute
            chown -R premiere:premiere /opt/premiere-ecoute
            systemctl restart premiere-ecoute
            systemctl status premiere-ecoute --no-pager
          '
