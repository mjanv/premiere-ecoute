name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Stream Deck plugins
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/streamdeck/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/streamdeck

      - name: Build plugins
        run: npm run build
        working-directory: apps/streamdeck

      - name: Package plugins
        run: |
          cd apps/streamdeck/com.maxime-janvier.premiere-ecoute-streamer.sdPlugin && zip -r ../com.maxime-janvier.premiere-ecoute-streamer.streamDeckPlugin .
          cd apps/streamdeck/com.maxime-janvier.premiere-ecoute-viewer.sdPlugin && zip -r ../com.maxime-janvier.premiere-ecoute-viewer.streamDeckPlugin .

      - name: Extract release notes
        id: notes
        run: |
          TAG=${GITHUB_REF_NAME#v}
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \[$TAG\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "${NOTES:-}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
          files: |
            apps/streamdeck/com.maxime-janvier.premiere-ecoute-streamer.streamDeckPlugin
            apps/streamdeck/com.maxime-janvier.premiere-ecoute-viewer.streamDeckPlugin
