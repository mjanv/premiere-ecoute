name: PR - Mobile CI

on:
  pull_request:
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/pr-mobile.yml'

jobs:
  lint:
    name: Lint and Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: apps/mobile/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('apps/mobile/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm ci

      - name: Run lint
        working-directory: apps/mobile
        run: npm run lint

      - name: Run typecheck
        working-directory: apps/mobile
        run: npx tsc --noEmit
