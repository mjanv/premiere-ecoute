services:
  postgres:
    image: postgres:17.6
    container_name: postgres
    environment:
      POSTGRES_DB: premiere_ecoute
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  seaweedfs:
    image: chrislusf/seaweedfs:4.33
    container_name: seaweedfs
    # All-in-one (master + volume + filer). The app talks to the Filer HTTP API on :8888.
    command: "server -dir=/data -filer -ip.bind=0.0.0.0 -master.volumeSizeLimitMB=1024"
    ports:
      - "8888:8888" # Filer HTTP API (used by the app for podcast audio/cover)
      - "9333:9333" # Master (dashboard/debug, optional)
    volumes:
      - seaweedfs_data:/data

  prometheus:
    image: prom/prometheus:v3.7.2
    container_name: prometheus
    volumes:
      - ./priv/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:12.2
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./priv/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_USERS_ALLOW_SIGN_UP=false

volumes:
  postgres_data:
  seaweedfs_data:
  grafana_data: